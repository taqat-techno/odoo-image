name: Build & Push Odoo Images

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Odoo version to build (leave empty for all)'
        required: false
        default: ''

jobs:
  build:
    name: Build odoo-image:${{ matrix.odoo_version }}.0
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - odoo_version: "14"
            python_version: "3.8"
            debian_codename: "bullseye"
          - odoo_version: "15"
            python_version: "3.8"
            debian_codename: "bullseye"
          - odoo_version: "16"
            python_version: "3.10"
            debian_codename: "bullseye"
          - odoo_version: "17"
            python_version: "3.12"
            debian_codename: "bookworm"
          - odoo_version: "18"
            python_version: "3.12"
            debian_codename: "bookworm"
          - odoo_version: "19"
            python_version: "3.12"
            debian_codename: "bookworm"

    steps:
      - name: Skip if targeting specific version
        if: github.event.inputs.version != '' && github.event.inputs.version != matrix.odoo_version
        run: echo "Skipping v${{ matrix.odoo_version }} (targeting v${{ github.event.inputs.version }})" && exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push alakosha/odoo-image:${{ matrix.odoo_version }}.0
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            ODOO_VERSION=${{ matrix.odoo_version }}
            PYTHON_VERSION=${{ matrix.python_version }}
            DEBIAN_CODENAME=${{ matrix.debian_codename }}
          tags: |
            alakosha/odoo-image:${{ matrix.odoo_version }}.0
            ${{ matrix.odoo_version == '19' && 'alakosha/odoo-image:latest' || '' }}
          cache-from: type=gha,scope=odoo-${{ matrix.odoo_version }}
          cache-to: type=gha,mode=max,scope=odoo-${{ matrix.odoo_version }}

  update-description:
    name: Sync README to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: alakosha/odoo-image
          readme-filepath: ./README.md
